spring.application.name=registration

# === Database ===
spring.datasource.url=jdbc:postgresql://localhost:5432/jpd_db
spring.datasource.username=jpd
spring.datasource.password=123456

# === JPA ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# === JWT ===
# Secret must be Base64-encoded and at least 256 bits (32 bytes) for HS256
jwt.secret=dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIEpXVCB0b2tlbiBnZW5lcmF0aW9u
# 24 hours in milliseconds
jwt.expiration=86400000
